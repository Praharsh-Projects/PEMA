<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ZERO-WAIT STS 3D pitch simulator for predictive ship-to-shore crane coordination."
    />
    <title>ZERO-WAIT STS 3D Pitch Simulator</title>
    <script>
      if (window.location.protocol === 'file:') {
        document.documentElement.style.background = '#050b12';
        document.addEventListener('DOMContentLoaded', function () {
          document.body.style.margin = '0';
          document.body.style.background = '#050b12';
          document.body.style.color = '#e5eef9';
          document.body.style.fontFamily =
            'Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
          document.body.innerHTML =
            '<main style="min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 30% 20%,rgba(56,189,248,.16),transparent 28%),#050b12;padding:24px">' +
            '<section style="max-width:560px;border:1px solid rgba(56,189,248,.45);border-radius:12px;background:rgba(10,18,30,.92);padding:28px;box-shadow:0 20px 70px rgba(0,0,0,.38)">' +
            '<div style="width:42px;height:42px;display:grid;place-items:center;border:2px solid #38bdf8;color:#38bdf8;font-weight:900;font-size:22px;margin-bottom:18px">Z</div>' +
            '<h1 style="margin:0 0 10px;font-size:30px;line-height:1">ZERO-WAIT STS</h1>' +
            '<p style="margin:0 0 20px;color:#9aa8ba;line-height:1.5">This is a React/Vite 3D simulator, so it must be opened through the local dev server, not directly as a file.</p>' +
            '<a href="http://localhost:5173/" style="display:inline-flex;align-items:center;min-height:42px;padding:0 16px;border:1px solid #38bdf8;border-radius:6px;color:#38bdf8;text-decoration:none;font-weight:800;letter-spacing:1px;text-transform:uppercase">Open 3D Simulator</a>' +
            '<p style="margin:18px 0 0;color:#64748b;font-size:13px">If the link does not load, run <code style="color:#e5eef9">npm run dev -- --port 5173</code> in this folder.</p>' +
            '</section>' +
            '</main>';
        });

        fetch('http://localhost:5173/', { mode: 'no-cors' })
          .then(function () {
            window.location.replace('http://localhost:5173/');
          })
          .catch(function () {});
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
